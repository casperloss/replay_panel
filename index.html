<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OBS Replay Dock</title>
<style>
:root{--bg:#0f1115;--panel:#171b22;--panel2:#1f2632;--line:#30394a;--text:#edf2f7;--muted:#94a3b8;--green:#20c997;--blue:#4dabf7;--red:#fa5252;--yellow:#ffd43b}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:14px/1.4 Inter,system-ui,sans-serif}
.wrap{padding:12px;display:grid;gap:12px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px}
.grid{display:grid;gap:8px}.cols-2{grid-template-columns:repeat(2,1fr)}.cols-3{grid-template-columns:repeat(3,1fr)}
button,input,textarea{font:inherit}button{appearance:none;border:1px solid var(--line);border-radius:12px;padding:11px 12px;background:var(--panel2);color:var(--text);cursor:pointer;font-weight:700}
button:hover{filter:brightness(1.08)}.green{background:var(--green);color:#06140f;border-color:transparent}.blue{background:var(--blue);color:#09131f;border-color:transparent}.red{background:var(--red);color:#220707;border-color:transparent}.yellow{background:var(--yellow);color:#1a1405;border-color:transparent}
.field{display:grid;gap:6px}.field label{font-size:12px;color:var(--muted)}input,textarea{width:100%;background:#10151d;color:var(--text);border:1px solid var(--line);border-radius:10px;padding:10px 12px}textarea{min-height:110px;resize:vertical}
.meta{display:flex;gap:8px;flex-wrap:wrap}.pill{padding:5px 9px;border-radius:999px;background:#10151d;border:1px solid var(--line);color:var(--muted);font-size:12px}
.cam-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.small{font-size:12px;color:var(--muted)}h1,h2{margin:0 0 8px}h1{font-size:18px}h2{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <h1>OBS Replay Dock</h1>
    <div class="grid cols-2">
      <div class="field"><label>WebSocket URL</label><input id="url" value="ws://127.0.0.1:4455"></div>
      <div class="field"><label>Hasło</label><input id="password" type="password" placeholder="Hasło z OBS"></div>
    </div>
    <div class="grid cols-2" style="margin-top:8px">
      <button id="connect" class="green">Połącz z OBS</button>
      <button id="disconnect" class="red">Rozłącz</button>
    </div>
    <div class="meta" style="margin-top:10px">
      <span class="pill" id="status">Status: niepołączony</span>
      <span class="pill" id="note">Ta wersja testuje czysty WebSocket bez zewnętrznych bibliotek.</span>
    </div>
  </div>

  <div class="panel">
    <h2>Konfiguracja kamer</h2>
    <div class="field">
      <label>Replay|Live, po jednej linii</label>
      <textarea id="sources">RS_CAM_1|CAM_1
RS_CAM_2|CAM_2</textarea>
    </div>
    <div class="small" style="margin-top:8px">Ta wersja jest diagnostyczna: najpierw sprawdzamy samo połączenie przyciskiem „Połącz z OBS”.</div>
  </div>

  <div class="panel">
    <h2>Kamery</h2>
    <div id="cams" class="grid"></div>
  </div>
</div>
<script>
let ws = null;
const $ = id => document.getElementById(id);

function renderCams(){
  const wrap = $('cams');
  wrap.innerHTML = '';
  $('sources').value.split(/\r?\n/).map(v => v.trim()).filter(Boolean).forEach((line, idx) => {
    const [replay, live] = line.split('|').map(v => (v || '').trim());
    if(!replay || !live) return;
    const row = document.createElement('div');
    row.className = 'cam-row';
    const b1 = document.createElement('button');
    b1.className = 'blue';
    b1.textContent = 'LIVE ' + live;
    const b2 = document.createElement('button');
    b2.className = 'green';
    b2.textContent = 'REPLAY ' + replay;
    row.append(b1,b2);
    wrap.appendChild(row);
  });
}

function setStatus(text){ $('status').textContent = 'Status: ' + text; }

function connectObs(){
  try {
    const url = $('url').value.trim();
    setStatus('łączenie…');
    ws = new WebSocket(url);
    ws.onopen = () => {
      setStatus('socket otwarty');
    };
    ws.onerror = (e) => {
      setStatus('błąd połączenia');
      console.error('WS error', e);
    };
    ws.onclose = () => {
      setStatus('rozłączony');
    };
    ws.onmessage = (ev) => {
      console.log('WS message', ev.data);
      setStatus('połączony / odebrano dane');
    };
  } catch(err) {
    setStatus('wyjątek JS');
    console.error(err);
  }
}

function disconnectObs(){
  try { if(ws) ws.close(); } catch(e) {}
  setStatus('rozłączony');
}

$('connect').addEventListener('click', connectObs);
$('disconnect').addEventListener('click', disconnectObs);
$('sources').addEventListener('input', renderCams);
renderCams();
</script>
</body>
</html>
